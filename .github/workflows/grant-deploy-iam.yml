name: Grant IAM roles to deploy account (run once)

on:
  workflow_dispatch:

jobs:
  grant:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_ADMIN_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Grant roles to oura-deploy
        run: |
          DEPLOY_SA="oura-deploy@ouraforphotographers.iam.gserviceaccount.com"
          PROJECT="ouraforphotographers"
          for ROLE in roles/artifactregistry.admin roles/run.admin roles/iam.serviceAccountUser; do
            gcloud projects add-iam-policy-binding $PROJECT \
              --member="serviceAccount:$DEPLOY_SA" \
              --role="$ROLE" \
              --quiet
            echo "Granted $ROLE"
          done

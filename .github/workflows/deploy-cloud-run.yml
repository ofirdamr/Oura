name: Deploy Cloud Run — embed + classify service

on:
  push:
    branches: [main]
    paths:
      - 'packages/processing-pipeline/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure deploy SA can act as the Cloud Run runtime SA
        run: |
          gcloud iam service-accounts add-iam-policy-binding \
            932309994000-compute@developer.gserviceaccount.com \
            --member="serviceAccount:oura-deploy@ouraforphotographers.iam.gserviceaccount.com" \
            --role="roles/iam.serviceAccountUser" \
            --project=ouraforphotographers --quiet \
          || echo "WARN: could not self-grant actAs (deploy SA lacks setIamPolicy) — grant it manually in the console if the deploy step fails"

      - name: Ensure Artifact Registry repo exists
        run: |
          gcloud artifacts repositories describe oura \
            --location=us-central1 \
            --project=ouraforphotographers \
            --quiet 2>/dev/null || \
          gcloud artifacts repositories create oura \
            --repository-format=docker \
            --location=us-central1 \
            --project=ouraforphotographers \
            --quiet

      - name: Build and push to Artifact Registry
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
          docker build \
            -t us-central1-docker.pkg.dev/ouraforphotographers/oura/embed-service:${{ github.sha }} \
            packages/processing-pipeline/
          docker push us-central1-docker.pkg.dev/ouraforphotographers/oura/embed-service:${{ github.sha }}

      - name: Deploy new revision to Cloud Run
        run: |
          gcloud run deploy oura-embed \
            --image us-central1-docker.pkg.dev/ouraforphotographers/oura/embed-service:${{ github.sha }} \
            --region us-central1 \
            --project ouraforphotographers \
            --quiet

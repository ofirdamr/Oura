<!DOCTYPE html>

<html class="dark" dir="rtl" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Oura - הגדרות מיתוג ולוגו</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Rubik', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .glass-panel {
            background: rgba(30, 27, 25, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#e2725b",
                        "on-primary": "#ffffff",
                        "primary-container": "#9f402d",
                        "secondary": "#77574d",
                        "surface": "#121212",
                        "on-surface": "#ffffff",
                        "surface-variant": "#1e1b19",
                        "on-surface-variant": "#fef8f4",
                        "outline": "#a38d89",
                        "inverse-surface": "#fef8f4",
                        "inverse-on-surface": "#1d1b19",
                        "primary-fixed-dim": "#ffb4a5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1rem",
                        "full": "9999px"
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-24">
<!-- Top Navigation Bar -->
<header class="bg-surface/95 backdrop-blur-md sticky top-0 z-50 border-b border-outline/30">
<div class="flex flex-row-reverse justify-between items-center px-4 w-full h-16">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-on-surface hover:text-primary transition-colors">notifications</button>
<button class="material-symbols-outlined text-on-surface hover:text-primary transition-colors">account_circle</button>
</div>
<div class="flex items-center gap-3">
<div class="bg-black p-0.5 rounded-lg border border-outline/40">
<img alt="Oura" class="h-8 w-8 object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCnTY6Kye5ul4tYFWr6o0b1ga_ErDg5LR62jHORUunB_XOB_ZLmZI-NLoZ3tZ-z5YyZ39KUQj2QUToY1VqZrxbvqR4avaE-XyVcpuDfbmnMTT1S_bqKjPW3Eo03GEPEhV96pcNaWIB62BbqzIzcj8cMzq8MPQt_igh1_qHV2tXodIdqUyJnPDKWuPnbf6ay1jk1kQ0H11tiA4uaoflNV-Wg20GsqyVB4x_2mW_uiZP_gG7b-wiQBxzIhC5uYMqqfnjz9LQsnEcanEdA"/>
</div>
<span class="font-bold text-xl tracking-tight text-on-surface">פוטו סנטוס</span>
</div>
<button class="material-symbols-outlined text-on-surface" onclick="history.back()">arrow_forward</button>
</div>
</header>
<main class="max-w-md mx-auto px-4 py-8 space-y-8">
<!-- Header Section -->
<section class="space-y-3 text-center">
<h1 class="text-3xl font-bold text-on-surface">הגדרות מיתוג ולוגו</h1>
<p class="text-on-surface-variant/90 text-base leading-relaxed">נהל את המראה והתחושה של הסטודיו שלך 'פוטו סנטוס' בממשק המערכת.</p>
</section>
<!-- Branding Preview Card -->
<div class="bg-surface-variant border border-outline/30 rounded-2xl p-6 space-y-5 shadow-2xl">
<div class="flex items-center justify-between">
<h2 class="text-lg font-bold text-primary-fixed-dim">תצוגה מקדימה של המותג</h2>
<span class="bg-primary/20 text-primary px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">פעיל</span>
</div>
<div class="flex items-center gap-4 p-4 bg-surface rounded-xl border border-outline/20">
<div class="w-16 h-16 rounded-xl overflow-hidden bg-black flex items-center justify-center border border-outline/40 shadow-inner">
<img alt="פוטו סנטוס" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBd8y5SrN-MCTyxmJDvP5hoLDAsYTCUG6GUPEnAWyJr9dplsWfi3Z_1nWi_5vpK6u1QqFZh0lQ_IF2I89leXoTHQ58B4zZ3uyDIEp4cVE4gRLmPXyrXBSSnIYuLHj87hwbcWXVdfWAlZ1nhGWRrZBwsXxEPPtGvvoPB-IrXDxa6SpcY-bq6DUjsZwQ3hziyy__ZXSPSlqW-WvuDb975Ajnch5v28nHrnVuMC4gPL3BtpCwgIDsvTpkYsHIkmCYhNkctCtdBEOo7afbA"/>
</div>
<div>
<p class="font-bold text-xl text-on-surface">פוטו סנטוס</p>
<p class="text-sm text-outline font-medium">צילום אירועים פרימיום</p>
</div>
</div>
</div>
<!-- Settings Controls -->
<div class="space-y-6">
<!-- Logo Upload -->
<div class="space-y-3">
<label class="block font-bold text-on-surface text-lg pr-1">לוגו הסטודיו</label>
<button class="w-full h-36 border-2 border-dashed border-outline/50 rounded-2xl flex flex-col items-center justify-center gap-2 hover:border-primary/80 hover:bg-white/5 transition-all group bg-surface-variant/30">
<span class="material-symbols-outlined text-4xl text-outline group-hover:text-primary">upload_file</span>
<span class="text-sm font-bold text-on-surface-variant group-hover:text-on-surface">החלף לוגו (PNG, SVG)</span>
</button>
</div>
<!-- Studio Name -->
<div class="space-y-3">
<label class="block font-bold text-on-surface text-lg pr-1">שם הסטודיו</label>
<input class="w-full bg-surface-variant border border-outline/40 rounded-xl px-4 py-4 focus:ring-2 focus:ring-primary focus:border-transparent text-lg font-bold text-on-surface outline-none transition-all placeholder:text-outline/50" type="text" value="פוטו סנטוס"/>
</div>
<!-- Primary Color -->
<div class="space-y-3">
<label class="block font-bold text-on-surface text-lg pr-1">צבע מותג ראשי</label>
<div class="flex items-center gap-3 bg-surface-variant border border-outline/40 rounded-xl px-4 py-3">
<div class="w-10 h-10 rounded-full bg-[#e2725b] border-2 border-white shadow-lg"></div>
<span class="flex-1 font-mono text-lg font-bold text-on-surface">#E2725B</span>
<button class="text-primary font-bold px-3 py-1 hover:bg-primary/10 rounded-lg transition-colors">שינוי</button>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-4 pt-6">
<button class="w-full bg-primary text-on-primary font-bold text-xl py-5 rounded-xl shadow-lg active:scale-[0.98] transition-all hover:bg-primary/90">
                שמירת שינויים
            </button>
<button class="w-full border-2 border-outline/50 text-on-surface font-bold text-lg py-4 rounded-xl hover:bg-white/5 hover:border-on-surface/50 active:scale-[0.98] transition-all">
                ביטול
            </button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center py-3 px-4 glass-panel border-t border-outline/30 rounded-t-2xl">
<a class="flex flex-col items-center text-outline hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-xs mt-1 font-medium">בית</span>
</a>
<a class="flex flex-col items-center text-outline hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">grid_view</span>
<span class="text-xs mt-1 font-medium">גלריה</span>
</a>
<a class="flex flex-col items-center text-outline hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">share</span>
<span class="text-xs mt-1 font-medium">שיתוף</span>
</a>
<a class="flex flex-col items-center text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">settings</span>
<span class="text-xs mt-1 font-bold">הגדרות</span>
</a>
</nav>
<script>
        // Interactive feedback for mobile
        document.querySelectorAll('button, a').forEach(el => {
            el.addEventListener('touchstart', () => {
                el.classList.add('opacity-70');
            });
            el.addEventListener('touchend', () => {
                el.classList.remove('opacity-70');
            });
        });
    </script>
</body></html>

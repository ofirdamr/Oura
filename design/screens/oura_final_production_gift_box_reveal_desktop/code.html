<script>
    // Three.js Interactive Box Logic
    let scene, camera, renderer, cube, lid, group;
    let isOpened = false;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / 500, 0.1, 1000);
        camera.position.z = 5;
        camera.position.y = 1;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(document.getElementById('canvas-container').clientWidth, 500);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0x9f402d, 1.5);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        const topLight = new THREE.DirectionalLight(0xffffff, 0.8);
        topLight.position.set(0, 10, 0);
        scene.add(topLight);

        group = new THREE.Group();
        
        // Materials
        const boxMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x121212, 
            roughness: 0.1, 
            metalness: 0.8 
        });
        const innerMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x9f402d, 
            emissive: 0x5a0d02,
            emissiveIntensity: 0.2
        });

        // Box Bottom
        const boxGeometry = new THREE.BoxGeometry(2, 1.5, 2);
        cube = new THREE.Mesh(boxGeometry, boxMaterial);
        group.add(cube);

        // Box Lid
        const lidGeometry = new THREE.BoxGeometry(2.1, 0.4, 2.1);
        lid = new THREE.Mesh(lidGeometry, boxMaterial);
        lid.position.y = 0.9;
        group.add(lid);

        // Ribbon (Primary Color)
        const ribbonGeom = new THREE.BoxGeometry(0.2, 2, 2.15);
        const ribbonMaterial = new THREE.MeshStandardMaterial({ color: 0x9f402d });
        const ribbon1 = new THREE.Mesh(ribbonGeom, ribbonMaterial);
        const ribbon2 = ribbon1.clone();
        ribbon2.rotation.y = Math.PI / 2;
        group.add(ribbon1, ribbon2);

        scene.add(group);

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if (!isOpened) {
            group.rotation.y += 0.005;
        }
        renderer.render(scene, camera);
    }

    // Interaction
    const container = document.getElementById('canvas-container');
    container.addEventListener('click', () => {
        if (!isOpened) {
            gsap.to(lid.position, { y: 3, duration: 1, ease: "power4.out" });
            gsap.to(lid.rotation, { x: -Math.PI / 4, duration: 1 });
            gsap.to(group.scale, { x: 1.2, y: 1.2, z: 1.2, duration: 0.5, yoyo: true, repeat: 1 });
            document.getElementById('box-instruction').innerText = "הקופסה פתוחה! המתנה בדרך אליך";
            isOpened = true;
        }
    });

    // Resize handling
    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / 500;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, 500);
    });

    init();
</script>

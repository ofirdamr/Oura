<script>
    // Selection interaction
    document.querySelectorAll('.masonry-grid img').forEach(img => {
        img.parentElement.addEventListener('click', function() {
            const container = this;
            const isSelected = container.classList.contains('border-2');
            
            if(!isSelected) {
                container.classList.add('border-2', 'border-primary', 'overflow-hidden');
                const checkDiv = document.createElement('div');
                checkDiv.className = 'selection-check absolute top-2 right-2 bg-primary rounded-full p-1.5 shadow-lg';
                checkDiv.innerHTML = '<span class="material-symbols-outlined text-white text-[18px]" style="font-variation-settings: \'FILL\' 1;">check</span>';
                container.appendChild(checkDiv);
            } else {
                container.classList.remove('border-2', 'border-primary', 'overflow-hidden');
                const check = container.querySelector('.selection-check');
                if(check) check.remove();
            }
        });
    });

    // Parallax scroll effect for hero
    window.addEventListener('scroll', () => {
        const scroll = window.scrollY;
        const heroImage = document.querySelector('header img');
        if(heroImage && scroll < 640) {
            heroImage.style.transform = `translateY(${scroll * 0.3}px) scale(${1 + scroll * 0.0003})`;
        }
    });

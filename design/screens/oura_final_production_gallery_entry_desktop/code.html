<style>

            ביטול שינויים
        </button>

<script>
        function selectFrame(frameType) {
            const wrapper = document.getElementById('frame-style-element');
            // Reset existing frame classes
            wrapper.classList.remove('frame-royal-gold', 'frame-minimalist-white', 'frame-dark-wood', 'frame-modern-terracotta', 'p-6', 'p-8', 'p-10');
            
            // Apply new frame style and padding
            switch(frameType) {
                case 'royal-gold':
                    wrapper.classList.add('frame-royal-gold', 'p-8');
                    break;
                case 'minimalist-white':
                    wrapper.classList.add('frame-minimalist-white', 'p-6');
                    break;
                case 'dark-wood':
                    wrapper.classList.add('frame-dark-wood', 'p-10');
                    break;
                case 'modern-terracotta':
                    wrapper.classList.add('frame-modern-terracotta', 'p-8');
                    break;
                default:
                    wrapper.classList.add('p-8');
            }

            // Visual feedback on cards
            const buttons = document.querySelectorAll('.flex-shrink-0.group');
            buttons.forEach(btn => {
                const inner = btn.querySelector('.rounded-2xl');
                inner.classList.remove('border-primary', 'shadow-lg');
                inner.classList.add('border-outline-variant');
            });
            
            const selectedBtn = event.currentTarget;
            if (selectedBtn) {
                const inner = selectedBtn.querySelector('.rounded-2xl');
                inner.classList.add('border-primary', 'shadow-lg');
                inner.classList.remove('border-outline-variant');
            }
        }

        // Live update business name
        const input = document.getElementById('business-name-input');
        const previewName = document.getElementById('preview-business-name');
        input.addEventListener('input', (e) => {
            previewName.textContent = e.target.value || 'OURA PRODUCTION';
        });

        // Initialize with Royal Gold
        document.addEventListener('DOMContentLoaded', () => {
            // Manual trigger of the first button styling if needed
            const firstBtn = document.querySelector('[onclick*="royal-gold"]');
            if (firstBtn) {
                const wrapper = document.getElementById('frame-style-element');
                wrapper.classList.add('frame-royal-gold', 'p-8');
            }
        });
    </script>

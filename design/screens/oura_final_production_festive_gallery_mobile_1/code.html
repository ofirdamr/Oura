<script>
        // Micro-interactions for selection
        document.querySelectorAll('.masonry-item').forEach(item => {
            item.addEventListener('click', function() {
                const img = this.querySelector('img');
                img.classList.toggle('border-2');
                img.classList.toggle('border-primary');
                
                let check = this.querySelector('.selection-check');
                if(!check) {
                    const checkDiv = document.createElement('div');
                    checkDiv.className = 'selection-check absolute top-2 right-2 bg-primary rounded-full p-1 shadow-lg';
                    checkDiv.innerHTML = '<span class="material-symbols-outlined text-white text-[14px]" style="font-variation-settings: \'FILL\' 1;">check</span>';
                    this.appendChild(checkDiv);
                } else {
                    check.remove();
                }

                // Show download overlay if any selected
                const selectedCount = document.querySelectorAll('.selection-check').length;
                const overlay = document.getElementById('download-overlay');
                if(selectedCount > 0) {
                    overlay.classList.remove('hidden');
                    overlay.querySelector('span').innerText = `${selectedCount} תמונות נבחרו להורדה`;
                } else {
                    overlay.classList.add('hidden');
                }
            });
        });

        // Atmospheric Scroll Effect for Hero
        window.addEventListener('scroll', () => {
            const scroll = window.scrollY;
            const heroImage = document.querySelector('header img');
            if(heroImage) {
                heroImage.style.transform = `translateY(${scroll * 0.4}px) scale(${1 + scroll * 0.0005})`;
            }
        });
    </script>

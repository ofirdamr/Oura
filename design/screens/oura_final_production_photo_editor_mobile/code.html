<!DOCTYPE html>

<html class="dark" dir="rtl" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Oura - עריכת תמונה</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;700;800&amp;family=Rubik:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-lowest": "#050505",
                    "surface-container": "#0d0d0d",
                    "surface-container-high": "#161616",
                    "primary": "#9f402d",
                    "on-primary": "#ffffff",
                    "primary-container": "#9f402d",
                    "on-primary-container": "#ffffff",
                    "surface": "#0d0d0d",
                    "background": "#0d0d0d",
                    "on-surface": "#e2e2e2",
                    "on-surface-variant": "#a8a8a8",
                    "outline": "#333333",
                    "secondary": "#2c2c2c"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-sm": "8px",
                    "stack-md": "24px",
                    "container-padding-mobile": "20px",
                    "container-padding-desktop": "40px",
                    "gutter": "16px",
                    "unit": "8px",
                    "stack-lg": "48px"
            },
            "fontFamily": {
                    "headline-lg-mobile": ["Rubik", "sans-serif"],
                    "headline-lg": ["Rubik", "sans-serif"],
                    "body-md": ["Rubik", "sans-serif"],
                    "display-lg": ["Rubik", "sans-serif"],
                    "label-sm": ["Hanken Grotesk", "sans-serif"],
                    "body-lg": ["Rubik", "sans-serif"],
                    "latin": ["Hanken Grotesk", "sans-serif"]
            },
            "fontSize": {
                    "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #0d0d0d;
            color: #e2e2e2;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Rubik', sans-serif;
        }

        .latin-brand {
            font-family: 'Hanken Grotesk', sans-serif;
        }

        .glass-card {
            background: rgba(22, 22, 22, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            background: #262626;
            border-radius: 1px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #9f402d;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 15px rgba(159, 64, 45, 0.5);
            transition: all 0.2s ease;
        }

        input[type="range"]:active::-webkit-slider-thumb {
            transform: scale(1.3);
            background: #bc4c36;
        }

        .switch-toggle {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #262626;
            transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: #e2e2e2;
            transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #9f402d;
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .photo-frame {
            position: relative;
            padding: 1px;
            background: #161616;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .watermark {
            font-family: 'Hanken Grotesk', sans-serif;
            letter-spacing: 0.3em;
            font-size: 9px;
            font-weight: 500;
            opacity: 0.8;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* RTL specific slider flip fix if needed, usually browser handles it */
        [dir="rtl"] input[type="range"] {
            direction: ltr;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen bg-background">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-surface/90 backdrop-blur-xl border-b border-white/5 h-16 flex items-center justify-between px-container-padding-mobile">
<div class="flex items-center">
<img alt="Oura Logo" class="h-6 w-auto active:scale-95 transition-transform" src="https://lh3.googleusercontent.com/aida/AP1WRLvzldxhTjxjftQpfWDfqJQ_0vN4GRIkTestrV7TugnaEjwLs81uwTVpNIvI6AKCv9UndelCBbMZBkPGvlVnYgVlfuZ-N6ahnrmpYlh4JUJhzsMbDmCfTJ3fTY0fp-eqJwWdURq9_6h4ovrgwtBGZWK-KhrkUWLjuQhz-ycLff1kRVZde5z0fETZqG4pbM98eq_6tcikKhxW6WJpopvBQl_TLCdnVX3MCSTfYSU6MAu8ZYD4z9H-0OFl9K8I"/>
</div>
<h1 class="font-headline-lg-mobile text-[20px] font-semibold text-on-surface">
        עריכת תמונה
    </h1>
<button class="text-on-surface-variant hover:text-on-surface transition-colors active:scale-90 p-2">
<span class="material-symbols-outlined text-2xl">arrow_forward</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 mt-16 pb-40 overflow-y-auto px-container-padding-mobile pt-stack-md">
<!-- Photo Preview Area -->
<section class="fade-in mb-10">
<div class="photo-frame rounded-sm overflow-hidden">
<div class="relative aspect-square bg-[#0a0a0a]">
<img alt="Editor Preview" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB0cIvjypebzO7Vd1fSfndVKYfVY4toD3KjhtvIRSJaKBwVk2_QC9whjm_nkiXFFrZpOjGcfpMAM1i8rwC2ODtWNd6xeT4zZxCDO3wVzFS4bq73LnA5HxJWxanbhFyHieVJJZOiK0OZyPAt9BgRr2dIhTXnQP_yj6wnd6xf3ETu-huZdtSPFzMawwhW8DUiXxXBznoCRPL5XPDTMTaVDbvKB5jlwuU98szxJsg9uScEGPBY9gukz0iS48ZralAJbAJ0afVf8HGQZ79f"/>
<!-- Watermark -->
<div class="absolute bottom-6 left-6 flex flex-col items-start select-none">
<span class="watermark uppercase latin-brand">PHOTO SANTOS</span>
<div class="w-14 h-[1px] bg-white/30 mt-1.5"></div>
</div>
</div>
</div>
</section>
<!-- Editing Tools Section -->
<section class="space-y-8 fade-in" style="animation-delay: 0.15s;">
<!-- Adjustment Sliders -->
<div class="space-y-7">
<!-- Brightness -->
<div class="space-y-3">
<div class="flex justify-between items-center px-1">
<span class="font-body-md text-on-surface-variant text-sm font-medium">בהירות</span>
<span class="font-label-sm text-primary text-xs">0</span>
</div>
<input max="100" min="-100" type="range" value="0"/>
</div>
<!-- Contrast -->
<div class="space-y-3">
<div class="flex justify-between items-center px-1">
<span class="font-body-md text-on-surface-variant text-sm font-medium">ניגודיות</span>
<span class="font-label-sm text-primary text-xs">0</span>
</div>
<input max="100" min="-100" type="range" value="0"/>
</div>
<!-- Saturation -->
<div class="space-y-3">
<div class="flex justify-between items-center px-1">
<span class="font-body-md text-on-surface-variant text-sm font-medium">רוויה</span>
<span class="font-label-sm text-primary text-xs">0</span>
</div>
<input max="100" min="-100" type="range" value="0"/>
</div>
<!-- Exposure -->
<div class="space-y-3">
<div class="flex justify-between items-center px-1">
<span class="font-body-md text-on-surface-variant text-sm font-medium">חשיפה</span>
<span class="font-label-sm text-primary text-xs">0</span>
</div>
<input max="100" min="-100" type="range" value="0"/>
</div>
</div>
<!-- Toggles Row -->
<div class="grid grid-cols-2 gap-4 pt-2">
<div class="bg-white/5 rounded-lg p-4 flex items-center justify-between border border-white/5">
<span class="font-body-md text-on-surface text-sm">מסגרת</span>
<label class="switch-toggle">
<input type="checkbox"/>
<span class="slider"></span>
</label>
</div>
<div class="bg-white/5 rounded-lg p-4 flex items-center justify-between border border-white/5">
<span class="font-body-md text-on-surface text-sm">אופטימיזציה</span>
<label class="switch-toggle">
<input checked="" type="checkbox"/>
<span class="slider"></span>
</label>
</div>
</div>
</section>
</main>
<!-- Bottom Action Area -->
<footer class="fixed bottom-0 w-full z-50 bg-background/95 backdrop-blur-md border-t border-white/5 pb-safe px-container-padding-mobile pt-4 pb-6">
<div class="flex flex-col gap-3 max-w-md mx-auto">
<button class="w-full bg-primary text-on-primary font-semibold py-4 rounded-lg font-body-lg active:scale-[0.98] transition-all shadow-xl shadow-primary/10">
            שמור
        </button>
<button class="w-full border border-primary text-primary font-medium py-3.5 rounded-lg font-body-lg active:scale-[0.98] transition-all bg-transparent">
            שתף
        </button>
</div>
</footer>
<!-- Micro-interactions Script -->
<script>
    document.querySelectorAll('input[type="range"]').forEach(slider => {
        slider.addEventListener('input', (e) => {
            const valueDisplay = e.target.parentElement.querySelector('.text-primary');
            if(valueDisplay) {
                valueDisplay.textContent = e.target.value;
            }
            
            // Preview logic
            const img = document.querySelector('main img');
            const sliders = document.querySelectorAll('input[type="range"]');
            const brightness = sliders[0].value;
            const contrast = sliders[1].value;
            const saturation = sliders[2].value;
            const exposure = sliders[3].value; // Map exposure to brightness as well for simplicity
            
            const totalBrightness = 100 + parseInt(brightness) + (parseInt(exposure) * 0.5);
            
            img.style.filter = `
                brightness(${totalBrightness}%) 
                contrast(${100 + parseInt(contrast)}%) 
                saturate(${100 + parseInt(saturation)}%)
            `;
        });
    });

    // Frame toggle logic
    const frameToggle = document.querySelector('input[type="checkbox"]');
    frameToggle.addEventListener('change', (e) => {
        const frame = document.querySelector('.photo-frame');
        const imgContainer = frame.querySelector('.relative');
        if(e.target.checked) {
            frame.style.padding = '24px';
            frame.style.backgroundColor = '#ffffff';
            frame.style.borderColor = 'transparent';
            document.querySelector('.watermark').style.color = '#000000';
            document.querySelector('.watermark').style.opacity = '1';
        } else {
            frame.style.padding = '1px';
            frame.style.backgroundColor = '#161616';
            frame.style.borderColor = 'rgba(255, 255, 255, 0.08)';
            document.querySelector('.watermark').style.color = '#ffffff';
            document.querySelector('.watermark').style.opacity = '0.8';
        }
    });
</script>
</body></html>

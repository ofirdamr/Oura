<style>
        body {
            background-color: #121414;
            color: #e2e2e2;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .latin-brand {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Lightbox Backdrop Animation */
        #lightbox {
            animation: backdropFadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes backdropFadeIn {
            from { 
                background-color: rgba(5, 5, 5, 0);
                backdrop-filter: blur(0px);
            }
            to { 
                background-color: rgba(5, 5, 5, 0.8);
                backdrop-filter: blur(16px);
            }
        }

        /* Lightbox Content Animation */
        #lightbox-content {
            animation: contentScaleIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes contentScaleIn {
            from { 
                opacity: 0;
                transform: scale(0.95);
            }
            to { 
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Sidebar Slide In Animation - RTL adjusted: slide from left because sidebar is on right in LTR, but in RTL it stays on the 'end' side which is the right side of the screen */
        #edit-sidebar {
            animation: sidebarSlideIn 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes sidebarSlideIn {
            from { 
                transform: translateX(100%);
                opacity: 0;
            }
            to { 
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Staggered items */
        .stagger-item {
            opacity: 0;
            animation: itemReveal 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes itemReveal {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stagger-item:nth-child(1) { animation-delay: 0.2s; }
        .stagger-item:nth-child(2) { animation-delay: 0.3s; }
        .stagger-item:nth-child(3) { animation-delay: 0.4s; }
        .stagger-item:nth-child(4) { animation-delay: 0.5s; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            background: #333535;
            border-radius: 1px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #ffb4a6;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 15px rgba(255, 180, 166, 0.3);
            transition: all 0.2s ease;
        }

        input[type="range"]:active::-webkit-slider-thumb {
            transform: scale(1.3);
            background: #ffdad4;
        }

        .switch-toggle {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333535;
            transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: #e2e2e2;
            transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #ffb4a6;
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .photo-frame {
            position: relative;
            padding: 1px;
            background: #1e2020;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .watermark {
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.3em;
            font-size: 9px;
            font-weight: 500;
            opacity: 0.8;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        [dir="rtl"] input[type="range"] {
            direction: ltr;
        }

        @media (min-width: 1024px) {
            .desktop-sidebar {
                width: 400px;
                border-left: 1px solid rgba(255, 255, 255, 0.05);
            }
            .photo-canvas {
                height: calc(100vh - 64px);
            }
        }
    </style>

<!-- Scripts -->
<script>
        // Adjustments Logic
        document.querySelectorAll('input[type="range"]').forEach(slider => {
            slider.addEventListener('input', (e) => {
                const valueDisplay = e.target.parentElement.querySelector('.text-primary');
                if(valueDisplay) {
                    valueDisplay.textContent = e.target.value;
                }
                
                const img = document.getElementById('main-preview');
                const sliders = document.querySelectorAll('input[type="range"]');
                const brightness = sliders[0].value;
                const contrast = sliders[1].value;
                const saturation = sliders[2].value;
                const exposure = sliders[3].value; 
                
                const totalBrightness = 100 + parseInt(brightness) + (parseInt(exposure) * 0.5);
                
                img.style.filter = `
                    brightness(${totalBrightness}%) 
                    contrast(${100 + parseInt(contrast)}%) 
                    saturate(${100 + parseInt(saturation)}%)
                `;
            });
        });

        // Frame toggle logic
        const frameToggle = document.getElementById('frame-toggle');
        frameToggle.addEventListener('change', (e) => {
            const frame = document.querySelector('.photo-frame');
            const watermark = document.querySelector('.watermark');
            if(e.target.checked) {
                frame.style.padding = '24px';
                frame.style.backgroundColor = '#ffffff';
                frame.style.borderColor = 'transparent';
                watermark.style.color = '#000000';
                watermark.style.opacity = '1';
                watermark.style.textShadow = 'none';
            } else {
                frame.style.padding = '1px';
                frame.style.backgroundColor = '#1e2020';
                frame.style.borderColor = 'rgba(255, 255, 255, 0.08)';
                watermark.style.color = '#ffffff';
                watermark.style.opacity = '0.8';
                watermark.style.textShadow = '0 2px 4px rgba(0,0,0,0.5)';
            }
        });
    </script>

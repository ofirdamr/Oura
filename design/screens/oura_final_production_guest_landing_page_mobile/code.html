<style>
        body {
            font-family: 'Rubik', sans-serif;
            background-color: #121414;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .qr-scanner-overlay {
            background: rgba(159, 64, 45, 0.05);
            position: relative;
        }
        .qr-scanner-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #e2725b;
            top: 0;
            left: 0;
            box-shadow: 0 0 15px #e2725b;
            animation: scan 3s infinite ease-in-out;
        }
        @keyframes scan {
            0%, 100% { top: 10%; }
            50% { top: 90%; }
        }
        .glass-card {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);

<script>
    // Simple UI interaction for the scan button
    const scanBtn = document.querySelector('button.bg-primary');
    if (scanBtn) {
        scanBtn.addEventListener('click', function() {
            const originalContent = this.innerHTML;
            this.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> מתחבר למצלמה...';
            setTimeout(() => {
                this.innerHTML = originalContent;
            }, 2000);
        });
    }

    // Input focus effect
    const inputField = document.getElementById('event-code');
    if (inputField) {
        inputField.addEventListener('focus', () => {
            inputField.closest('.glass-card').classList.add('ring-1', 'ring-primary/20');
        });
        inputField.addEventListener('blur', () => {
            inputField.closest('.glass-card').classList.remove('ring-1', 'ring-primary/20');
        });
    }
</script>

<!-- Micro-interaction Scripts -->
<script>
    document.querySelectorAll('button').forEach(button => {
        button.addEventListener('mousedown', function(e) {
            this.classList.add('opacity-80');
            setTimeout(() => this.classList.remove('opacity-80'), 150);
        });
    });

    const radioLabels = document.querySelectorAll('label');
    radioLabels.forEach(label => {
        label.addEventListener('click', () => {
            radioLabels.forEach(l => l.classList.remove('border-primary', 'bg-primary-container/10'));
            label.classList.add('border-primary', 'bg-primary-container/10');
        });
    });
</script>

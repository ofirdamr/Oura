<style>
        body {
            font-family: 'Rubik', sans-serif;
            background-color: #131313;
            color: #e5e2e1;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;

        .material-symbols-outlined {

        }
        .glass-effect {
            background: rgba(19, 19, 19, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .premium-border {
            border: 1px solid rgba(255, 180, 166, 0.2);
        }
        .active-selection {
            border: 2px solid #ffb4a6;
            background: rgba(255, 180, 166, 0.1);
        }
        .photo-preview-container {
            perspective: 1000px;
        }
        .photo-frame {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

<div class="bg-black/40 p-1.5 rounded-sm">
<img alt="תצוגה מקדימה של ההזמנה" class="w-64 h-80 object-cover rounded-sm" id="preview-image" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBzYj5rYPIxi5BxTcwlzoep1l1wzIjALKk_zJL5V7F0NmxnxwlEfVcrJqcbCNZLAaWw4nRhXBnVhaXlxROdBHdQJWoQCMk2vcsmd9E1T1MoOWN_EHVKWekvJE2AveoWG93R8rhpJVGPgRsurAbcQh0ET9WQsJhPTSTU3PmTqw9zKorS5yufrw6whVxoWyHnwYpdYN9HH0A7aP_bUzkLMEqCfnNYDD-KqcdsAyQrZrDktI0tTFSHI2Uoto_I3hbGJsTUGhqmnxdO7iTz"/>
</div>
</div>
</section>
<!-- Product Title -->
<div class="text-right mb-8">
<h1 class="font-headline-md text-on-surface mb-2">הדפסת פרימיום</h1>
<p class="font-body-lg text-on-surface-variant">איכות מוזיאונית למזכרות הכי יפות שלכם</p>
</div>
<!-- Size Selection -->
<section class="mb-10">
<h2 class="font-title-md text-on-surface mb-4">בחר גודל הדפסה</h2>
<div class="grid grid-cols-3 gap-3">
<button class="size-btn active-selection p-4 rounded-xl flex flex-col items-center gap-1 transition-all" onclick="selectItem(this, 'size-btn')">
<span class="font-label-lg text-on-surface">10x15</span>
<span class="font-label-sm text-primary">₪15</span>
</button>
<button class="size-btn premium-border p-4 rounded-xl flex flex-col items-center gap-1 transition-all bg-surface-container-low" onclick="selectItem(this, 'size-btn')">
<span class="font-label-lg text-on-surface">13x18</span>
<span class="font-label-sm text-primary">₪25</span>
</button>
<button class="size-btn premium-border p-4 rounded-xl flex flex-col items-center gap-1 transition-all bg-surface-container-low" onclick="selectItem(this, 'size-btn')">
<span class="font-label-lg text-on-surface">20x30</span>
<span class="font-label-sm text-primary">₪45</span>

</div>

<!-- Paper Type Selection -->
<section class="mb-10">

</div>
</div>
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<button class="paper-btn premium-border p-4 rounded-xl flex justify-between items-center transition-all bg-surface-container-low" onclick="selectItem(this, 'paper-btn')">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant text-2xl">auto_awesome</span>
<div class="text-right">
<p class="font-label-lg text-on-surface">נייר מבריק (Glossy)</p>
<p class="font-label-sm text-on-surface-variant">צבעים עזים וחדות מקסימלית</p>
</div>
</div>
</button>
<button class="paper-btn premium-border p-4 rounded-xl flex justify-between items-center transition-all bg-surface-container-low" onclick="selectItem(this, 'paper-btn')">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant text-2xl">settings_brightness</span>
<div class="text-right">
<p class="font-label-lg text-on-surface">נייר משי (Silk)</p>
<p class="font-label-sm text-on-surface-variant">טקסטורה יוקרתית ועמידה</p>
</div>
</div>
</button>
</div>

<!-- Framing Options -->
<section class="mb-10">

<div class="flex gap-4 overflow-x-auto pb-4 no-scrollbar">
<!-- Frame Option 1 -->

</div>

</div>
<!-- Frame Option 2 -->
<div class="frame-option min-w-[150px] flex-shrink-0 group cursor-pointer" onclick="updateFrame('black', this)">
<div class="aspect-square bg-surface-container rounded-lg mb-3 flex items-center justify-center p-3 premium-border group-hover:border-primary transition-colors">
<div class="w-full h-full bg-[#0e0e0e] border-[6px] border-[#2a2a2a] rounded-sm shadow-inner"></div>
</div>
<p class="font-label-lg text-on-surface text-center mb-1">שחור מט</p>
<p class="font-label-sm text-center text-primary">+₪75</p>
</div>
<!-- Frame Option 3 -->
<div class="frame-option min-w-[150px] flex-shrink-0 group cursor-pointer" onclick="updateFrame('gold', this)">
<div class="aspect-square bg-tertiary-container/10 rounded-lg mb-3 flex items-center justify-center p-3 premium-border group-hover:border-primary transition-colors">
<div class="w-full h-full bg-[#201f1f] border-[6px] border-[#29c09f] rounded-sm shadow-inner"></div>
</div>

<p class="font-label-sm text-center text-primary">+₪120</p>
</div>
</div>

</main>
<!-- Sticky Bottom Section -->
<footer class="fixed bottom-0 left-0 right-0 glass-effect border-t border-white/5 z-50">
<div class="max-w-md mx-auto px-6 py-6 flex items-center justify-between">
<div class="text-right">
<p class="font-label-sm text-on-surface-variant mb-1">סה״כ לתשלום</p>
<p class="font-headline-md text-primary">₪104.00</p>
</div>
<button class="bg-primary hover:bg-primary-container text-on-primary font-title-md px-10 py-4 rounded-full flex items-center gap-3 active:scale-95 transition-all shadow-lg shadow-primary/20">
<span>הוספה לסל</span>
<span class="material-symbols-outlined">add_shopping_cart</span>
</button>
</div>
</footer>
<script>
        function selectItem(element, className) {
            const buttons = document.querySelectorAll('.' + className);
            buttons.forEach(btn => {
                btn.classList.remove('active-selection');
                btn.classList.add('premium-border', 'bg-surface-container-low');
                // Handle the check icon for paper buttons
                const icon = btn.querySelector('.check-icon-dynamic');
                if(icon) icon.remove();
            });
            
            element.classList.add('active-selection');
            element.classList.remove('premium-border', 'bg-surface-container-low');
            
            // Add check icon if it's a paper button
            if (className === 'paper-btn') {
                const checkSpan = document.createElement('span');
                checkSpan.className = 'material-symbols-outlined text-primary check-icon-dynamic';
                checkSpan.style.fontVariationSettings = "'FILL' 1";
                checkSpan.innerText = 'check_circle';
                element.appendChild(checkSpan);
            }
        }

        function updateFrame(type, element) {
            const frame = document.getElementById('main-frame');
            const options = document.querySelectorAll('.frame-option');
            
            options.forEach(opt => opt.style.opacity = '0.5');
            element.style.opacity = '1';

            switch(type) {
                case 'oak':
                    frame.style.backgroundColor = '#752215';
                    frame.style.borderColor = '#7f291c';
                    break;
                case 'black':
                    frame.style.backgroundColor = '#1c1b1b';
                    frame.style.borderColor = '#353534';
                    break;
                case 'gold':
                    frame.style.backgroundColor = '#00493a';
                    frame.style.borderColor = '#29c09f';
                    break;
            }

            // Enhanced animation
            frame.style.transform = 'scale(1.08) rotateY(-5deg) rotateX(5deg)';
            setTimeout(() => {
                frame.style.transform = 'scale(1) rotateY(-5deg) rotateX(5deg)';
            }, 300);
        }

        // Smooth tilt effect based on scroll
        window.addEventListener('scroll', () => {
            const frame = document.getElementById('main-frame');
            const rect = frame.getBoundingClientRect();
            const viewHeight = window.innerHeight;
            
            // Adjust tilt as frame moves through viewport
            const centerOffset = (rect.top + rect.height/2) - (viewHeight/2);
            const rotationY = -5 + (centerOffset / 100);
            const rotationX = 5 - (centerOffset / 200);
            
            frame.style.transform = `rotateY(${rotationY}deg) rotateX(${rotationX}deg)`;
        });
    </script>

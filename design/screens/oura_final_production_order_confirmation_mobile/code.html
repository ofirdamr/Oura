<!DOCTYPE html>

<html class="dark" dir="rtl" lang="he"><head>

            theme: {

                        "background": "#000000",

                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#ddc0ba",
                        "surface-container-lowest": "#000000",
                        "on-surface": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-background": "#ffffff",
                        "on-tertiary-fixed-variant": "#574500",
                        "surface-container-low": "#1a1a1a",
                        "surface-tint": "#9f402d",
                        "surface-dim": "#000000",
                        "secondary-fixed-dim": "#e7bdb1",
                        "on-secondary-fixed": "#2c160e",
                        "surface-container-high": "#262626",
                        "inverse-primary": "#ffb4a5",
                        "error": "#ff5449",
                        "surface-container": "#1a1a1a",
                        "tertiary-fixed-dim": "#e9c349",
                        "tertiary-container": "#cca72f",
                        "primary": "#e2725b",
                        "on-primary-container": "#ffffff",
                        "surface-variant": "#2c2c2c",
                        "outline-variant": "#4d4d4d",
                        "on-secondary-fixed-variant": "#5d4037",

                        "tertiary-fixed": "#ffe088",

                        "surface-bright": "#333333",
                        "tertiary": "#735c00",

                    "spacing": {

                        "margin-desktop": "32px",

                        "xxl": "48px"
                    },
                    "fontFamily": {
                        "body-md": ["Rubik"],
                        "label-sm": ["Rubik"],
                        "headline-lg-mobile": ["Rubik"],
                        "title-lg": ["Rubik"],

                    "fontSize": {

                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "0px", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Rubik', sans-serif;
            overflow-x: hidden;
        }
        .qr-frame-animation {
            border: 2px solid #e2725b;
            position: relative;
        }
        .qr-scanner-line {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #e2725b, transparent);
            position: absolute;
            top: 0;
            animation: scan 3s ease-in-out infinite;
        }
        @keyframes scan {
            0%, 100% { top: 0; }
            50% { top: 100%; }
        }
        .glass-panel {
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">
<!-- Subtle Background Shader -->
<div class="fixed inset-0 -z-10 opacity-10">
<div class="absolute inset-0 bg-gradient-to-tr from-primary/30 via-transparent to-primary/10"></div>
</div>
<!-- Main Content Container -->
<main class="flex-1 flex flex-col items-center px-margin-mobile pt-xxl pb-xl w-full max-w-md mx-auto">
<!-- Logo Section -->
<header class="mb-xxl animate-in fade-in slide-in-from-top-4 duration-1000">
<img alt="Oura Logo" class="w-32 h-32 object-contain rounded-xl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBB6XpN7Fi3wWs96j5r9YJkdquYx_qYmOQkDjPWcci7pFQ_39S7Apb_ibpp7cdKwwmdtw2js8ojIG7jgfVRr6CzwHMZx7Ll3wUXjrbpoArSwkmPbP7aphgdsk_P81HUXJ2w1lORpyUQAKmQDslrLyL6LBN7ccUIqitkNk1g8YXZvO5GraxftaKZWiDJhmijYqVZbB-U66EmiKClxQh0RFsPW_54G7h8uGIucROIKRDUvUQ_LML-K1nR0vlmyr6ChRZo5N2ytyBB7cdS"/>
</header>
<!-- Welcome Text -->
<section class="text-center mb-xl">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile mb-sm text-on-surface">ברוכים הבאים לאירוע שלכם</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto leading-relaxed">
            סרקו את קוד ה-QR שמופיע על השולחן או הזינו את קוד האירוע כדי לצפות בגלריה ולשתף חוויות.
        </p>
</section>
<!-- Primary Action: QR Scanner Area -->
<section class="w-full mb-lg">
<div class="glass-panel rounded-xl p-6 flex flex-col items-center">
<!-- QR Stylized Frame -->
<div class="w-48 h-48 qr-frame-animation rounded-lg mb-lg flex items-center justify-center overflow-hidden bg-black/40">
<div class="qr-scanner-line"></div>
<span class="material-symbols-outlined text-outline text-6xl opacity-20">qr_code_scanner</span>
<!-- Decorative Corners -->
<div class="absolute -top-1 -right-1 w-6 h-6 border-t-4 border-r-4 border-primary rounded-tr-sm"></div>
<div class="absolute -top-1 -left-1 w-6 h-6 border-t-4 border-l-4 border-primary rounded-tl-sm"></div>
<div class="absolute -bottom-1 -right-1 w-6 h-6 border-b-4 border-r-4 border-primary rounded-br-sm"></div>
<div class="absolute -bottom-1 -left-1 w-6 h-6 border-b-4 border-l-4 border-primary rounded-bl-sm"></div>
</div>
<button class="w-full py-4 bg-primary text-on-primary font-label-lg text-label-lg rounded-lg shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2 group">
<span class="material-symbols-outlined group-hover:rotate-12 transition-transform">photo_camera</span>
                הפעל מצלמה לסריקה
            </button>
</div>
</section>
<!-- Divider -->
<div class="flex items-center w-full gap-4 mb-lg px-md">
<div class="flex-1 h-px bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant">או</span>
<div class="flex-1 h-px bg-outline-variant"></div>
</div>
<!-- Secondary Action: Manual Entry -->
<section class="w-full space-y-md">
<div class="relative group">
<input class="w-full h-14 bg-surface-container text-on-surface border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg text-center font-body-lg text-body-lg transition-all placeholder:text-outline placeholder:font-light" maxlength="6" placeholder="הזינו קוד אירוע" type="text"/>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">key</span>
</div>
</div>
<button class="w-full py-4 border border-outline-variant text-on-surface font-label-lg text-label-lg rounded-lg hover:bg-surface-variant active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">login</span>
            כניסה לגלריה
        </button>
</section>
<!-- Footer -->
<footer class="mt-auto pt-xl">
<a class="font-label-sm text-label-sm text-outline flex items-center gap-1 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[16px]">help_outline</span>
            מרכז הסיוע של Oura
        </a>
</footer>
</main>
<!-- Floating Action Background Glow -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-[300px] h-[300px] bg-primary/20 blur-[120px] rounded-full -z-10"></div>
<script>
    // Micro-interaction for input field
    const input = document.querySelector('input');
    if(input) {
        input.addEventListener('input', (e) => {
            e.target.value = e.target.value.toUpperCase();
        });
    }

    // Simple button active state feedback
    document.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', function() {
            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            this.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });
    });
</script>
</body></html>

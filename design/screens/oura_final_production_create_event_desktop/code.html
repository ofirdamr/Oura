<!-- Modal Overlay Container -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-margin-mobile md:p-margin-desktop glass-effect">
<!-- Create New Event Modal Card -->
<div class="bg-surface-container-low w-full max-w-2xl rounded-xl shadow-2xl border border-outline-variant overflow-hidden animate-in fade-in zoom-in duration-300">
<!-- Modal Header -->
<div class="px-xl py-lg border-b border-outline-variant flex flex-row-reverse justify-between items-center bg-surface-container-high">
<div class="flex flex-col items-end">

<p class="font-body-md text-body-md text-on-surface-variant">הזן פרטים ליצירת גלריה חכמה עבור Photo Santos</p>
</div>
<button class="p-2 hover:bg-surface-variant rounded-full transition-colors text-on-surface-variant">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Body / Form -->
<form class="p-xl space-y-xl">
<!-- Event Name Field -->
<div class="space-y-xs">
<label class="block text-right font-label-lg text-on-surface-variant" for="event_name">שם האירוע</label>
<div class="relative">
<input class="w-full h-12 bg-surface-container border border-outline rounded-lg px-4 text-right font-body-lg focus:border-2 focus:border-primary-container focus:ring-0 transition-all text-on-surface placeholder:text-outline" id="event_name" placeholder="למשל: חתונת יוסי ודנה" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-3 text-outline">celebration</span>
</div>
</div>
<!-- Date and Location Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Date Field -->
<div class="space-y-xs">
<label class="block text-right font-label-lg text-on-surface-variant" for="event_date">תאריך האירוע</label>
<div class="relative">
<input class="w-full h-12 bg-surface-container border border-outline rounded-lg px-4 text-right font-body-lg focus:border-2 focus:border-primary-container focus:ring-0 transition-all text-on-surface" id="event_date" type="date"/>
<span class="material-symbols-outlined absolute left-3 top-3 text-outline">calendar_today</span>
</div>
</div>
<!-- Location Field -->
<div class="space-y-xs">
<label class="block text-right font-label-lg text-on-surface-variant" for="event_location">מיקום</label>
<div class="relative">
<input class="w-full h-12 bg-surface-container border border-outline rounded-lg px-4 text-right font-body-lg focus:border-2 focus:border-primary-container focus:ring-0 transition-all text-on-surface placeholder:text-outline" id="event_location" placeholder="שם האולם או העיר" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-3 text-outline">location_on</span>
</div>
</div>

<div class="border-t border-dashed border-outline-variant flex justify-center -mt-px">

</div>

</div>

<span>הפקה גלריה וברקוד</span>

</button>
<button class="px-xl h-14 border border-outline text-on-surface hover:bg-surface-variant rounded-xl font-label-lg transition-all active:scale-[0.98]" type="button">
                        ביטול
                    </button>

<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute -top-24 -right-24 w-96 h-96 bg-primary/20 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-24 -left-24 w-96 h-96 bg-secondary/15 rounded-full blur-[120px]"></div>
</div>
<script>
        // Simple Interaction logic
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> <span>מעבד נתונים...</span>';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> <span>הושלם בהצלחה</span>';
                btn.classList.replace('bg-primary-container', 'bg-green-600');
                btn.classList.replace('text-on-primary-container', 'text-white');
            }, 1500);
        });

        // Close logic
        document.querySelectorAll('button').forEach(btn => {
            if (btn.textContent.includes('ביטול') || btn.querySelector('.material-symbols-outlined')?.textContent === 'close') {
                btn.addEventListener('click', () => {
                    const modalOverlay = document.querySelector('.glass-effect');
                    modalOverlay.classList.add('opacity-0', 'pointer-events-none');
                    modalOverlay.classList.remove('flex');
                    modalOverlay.style.transition = 'opacity 0.3s ease';
                });
            }
        });
    </script>

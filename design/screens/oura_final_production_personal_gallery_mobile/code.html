<script>
        // Micro-interactions for button active states
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', () => {
                button.style.transform = 'scale(0.97)';
            }, {passive: true});
            button.addEventListener('touchend', () => {
                button.style.transform = 'scale(1)';
            }, {passive: true});
        });

        // Filter chip selection logic
        const chips = document.querySelectorAll('.whitespace-nowrap');
        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                chips.forEach(c => {
                    c.classList.remove('bg-primary', 'text-on-primary-container', 'shadow-md', 'font-bold');
                    c.classList.add('bg-surface', 'text-on-surface-variant', 'border', 'border-white/5', 'font-medium');
                });
                chip.classList.add('bg-primary', 'text-on-primary-container', 'shadow-md', 'font-bold');
                chip.classList.remove('bg-surface', 'text-on-surface-variant', 'border', 'border-white/5', 'font-medium');
            });
        });
    </script>

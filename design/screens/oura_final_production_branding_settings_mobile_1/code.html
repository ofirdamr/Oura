<script>
        // Micro-interactions for button active states
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
            button.addEventListener('mouseleave', () => {
                button.classList.remove('scale-95');
            });
        });

        // Filter chip selection logic
        const chips = document.querySelectorAll('.whitespace-nowrap');
        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                chips.forEach(c => {
                    c.classList.remove('bg-primary-container', 'text-on-primary', 'shadow-md');
                    c.classList.add('bg-surface-container-highest', 'text-on-surface-variant');
                });
                chip.classList.add('bg-primary-container', 'text-on-primary', 'shadow-md');
                chip.classList.remove('bg-surface-container-highest', 'text-on-surface-variant');
            });
        });
    </script>

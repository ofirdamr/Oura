# Oura API — Cloudflare Worker (Hono)
# Secrets are NEVER stored here. Set them with `wrangler secret put`:
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY
# (see apps/api/README-DEPLOY.md)

name = "oura-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# R2 binding to the existing media bucket (created by the founder).
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "ouramedia"

# Cloudflare Workers AI — used for photo category classification and closed-eye
# Native rate limiter gating POST /auth/forgot-password. Config-only (no KV
# namespace, no migration). Cloudflare currently supports a 10s or 60s window;
# 3 requests / 60s per key throttles the reset-email abuse without blocking a
# real user's occasional retry. Keyed per-email AND per-IP in index.ts.
[[unsafe.bindings]]
name = "RESET_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 1, period = 60 }

# Stage 2 face-embedding queue: photo uploads enqueue here, the Worker's own
# `queue()` handler (src/queueConsumer.ts) consumes it. Created via
# `npx wrangler queues create face-embed-queue` / `face-embed-queue-dlq`.
[[queues.producers]]
queue = "face-embed-queue"
binding = "FACE_EMBED_QUEUE"

[[queues.consumers]]
queue = "face-embed-queue"
max_batch_size = 5
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "face-embed-queue-dlq"

# Cron triggers (dispatched in index.ts `scheduled` by event.cron):
#   "0 3 * * *"  — daily biometric-retention cleanup (src/scheduledCleanup.ts),
#                  enforces the 30-day TTL from migration 0003's trigger.
#   "*/5 * * * *" — keep the embed service warm (src/keepEmbedWarm.ts) so a guest
#                  selfie never hits a Cloud Run cold start / "face not recognized".
[triggers]
crons = ["0 3 * * *", "*/5 * * * *"]

# Non-secret vars only. Do not put keys/tokens here.
[vars]
ENVIRONMENT = "production"
# EMBED_SERVICE_URL points at the self-hosted InsightFace/ArcFace service
# (packages/processing-pipeline), deployed to Cloud Run (project
# ouraforphotographers, region us-central1) — publicly reachable at the
# network level, gated by the EMBED_SERVICE_TOKEN bearer secret below, not
# Google IAM (no VPC peering between this Worker and Cloud Run exists).
EMBED_SERVICE_URL = "https://oura-embed-932309994000.us-central1.run.app"
# Cosine-similarity tuning knobs — first things to adjust after watching real
# pilot-event match rates, without a code redeploy. See src/pipeline/cluster.ts
# and the /guests/:token/selfie route for the asymmetric-threshold rationale.
CLUSTER_MATCH_THRESHOLD = "0.5"
# 0.42 was too strict for a phone selfie vs. event photos (real guests failed to
# match despite being in many photos). 0.35 is a balanced cosine-similarity bar
# for selfie→photo matching; lower further only with care (privacy: too low can
# cross-match different guests). Instantly revertible via redeploy.
GUEST_MATCH_THRESHOLD = "0.35"
GUEST_MATCH_TOPK = "20"
